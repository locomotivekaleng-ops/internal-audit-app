<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Audit — Monitoring System</title>
  <meta name="description" content="Internal Audit Monitoring System — Track fraud, WBS, FDS, and audit activities across all departments." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="app-root">
    <!-- Dynamically rendered by app.js -->
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden" role="status" aria-live="polite">
    <div class="loading-spinner">
      <div class="spinner" style="width:36px;height:36px;border-width:3px"></div>
      <p style="font-size:13px;color:var(--text-secondary);margin-top:12px">Memuat...</p>
    </div>
  </div>

  <!-- Modal container -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container"></div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/audit-metrics.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/components.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

  <!-- SPA redirect: preserve the path after redirect -->
  <script>
    (function() {
      const segment = window.location.pathname.substring(window.location.pathname.lastIndexOf('/') + 1);
      if (segment && segment !== '404.html') {
        sessionStorage.setItem('gh_redirect', '/' + segment.replace(/\.html$/, ''));
      }
    })();
  </script>
</body>
</html>
